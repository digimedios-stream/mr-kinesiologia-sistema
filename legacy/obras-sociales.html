<div class="p-4 sm:p-8 space-y-6 animate-[fadeIn_0.5s_ease-out]">
    <!-- Header Section -->
    <div class="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-100 gap-4">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl kinetic-gradient flex items-center justify-center text-on-primary shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined text-2xl">account_balance</span>
            </div>
            <div>
                <h2 class="text-2xl font-manrope font-extrabold text-on-surface tracking-tight">Obras Sociales</h2>
                <p class="text-xs text-slate-500 font-medium">Gestión de convenios y coberturas médicas</p>
            </div>
        </div>
        <button class="bg-[#2a86d2] hover:bg-[#1e6fbc] text-white px-6 py-2.5 rounded-lg font-bold flex items-center gap-2 shadow-sm transition-all active:scale-95" onclick="document.getElementById('newAssuranceModal').classList.remove('hidden')">
            <span class="material-symbols-outlined">add</span>
            Nueva Obra Social
        </button>
    </div>

    <!-- Main Table -->
    <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-[11px] font-bold text-slate-600 uppercase tracking-widest bg-slate-50/50 border-b border-slate-100">
                        <th class="px-6 py-4">ID</th>
                        <th class="px-6 py-4">Nombre</th>
                        <th class="px-6 py-4">Código</th>
                        <th class="px-6 py-4">Teléfono</th>
                        <th class="px-6 py-4">Email</th>
                        <th class="px-6 py-4">Pacientes</th>
                        <th class="px-6 py-4 text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50" id="obrasSocialesTableBody">
                    <!-- Loading Placeholder -->
                    <tr>
                        <td colspan="7" class="px-6 py-12 text-center text-slate-400">
                            <span class="material-symbols-outlined animate-spin mb-2">sync</span>
                            <p class="text-sm font-medium">Cargando obras sociales...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Agregar Obra Social (Simplificado) -->
<div id="newAssuranceModal" class="fixed inset-0 z-[60] hidden bg-slate-900/40 backdrop-blur-sm flex items-center justify-center animate-[fadeIn_0.3s_ease-out] p-4 text-left">
    <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl flex flex-col max-h-[95vh] animate-[slideUp_0.4s_ease-out]">
        
        <!-- Modal Header -->
        <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/30 rounded-t-2xl">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-primary/10 text-primary flex items-center justify-center">
                    <span class="material-symbols-outlined">add_business</span>
                </div>
                <div>
                    <h2 class="text-lg font-bold text-on-surface">Nueva Obra Social</h2>
                    <p class="text-xs text-slate-500 font-medium">Registrar nuevo convenio</p>
                </div>
            </div>
            <button class="text-slate-400 hover:text-error transition-colors p-2 rounded-full hover:bg-error-container/20" onclick="document.getElementById('newAssuranceModal').classList.add('hidden')">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        
        <div class="p-6 md:p-8 overflow-y-auto space-y-4 flex-1">
            <div class="grid grid-cols-1 gap-4">
                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-slate-500 uppercase">Nombre</label>
                    <input type="text" id="os-nombre" placeholder="Ej. OSDE..." class="w-full border border-slate-200 rounded-lg p-2.5 text-sm font-medium focus:ring-2 focus:ring-primary/20 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-slate-500 uppercase">Código / Sigla</label>
                    <input type="text" id="os-codigo" placeholder="Ej. OSDE-310" class="w-full border border-slate-200 rounded-lg p-2.5 text-sm font-medium focus:ring-2 focus:ring-primary/20 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-slate-500 uppercase">Teléfono</label>
                        <input type="text" id="os-telefono" placeholder="0800..." class="w-full border border-slate-200 rounded-lg p-2.5 text-sm font-medium focus:ring-2 focus:ring-primary/20 outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-slate-500 uppercase">Email</label>
                        <input type="email" id="os-email" placeholder="contacto@..." class="w-full border border-slate-200 rounded-lg p-2.5 text-sm font-medium focus:ring-2 focus:ring-primary/20 outline-none">
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Modal Footer -->
        <div class="px-6 py-4 border-t border-slate-100 bg-slate-50/30 rounded-b-2xl flex justify-end gap-3">
            <button class="px-5 py-2.5 text-sm font-bold text-slate-500 hover:text-slate-800 transition-colors" onclick="document.getElementById('newAssuranceModal').classList.add('hidden')">
                Cancelar
            </button>
            <button class="px-6 py-2.5 text-sm font-bold bg-[#2a86d2] text-white rounded-lg shadow-sm hover:brightness-110 active:scale-95 transition-all flex items-center gap-2" onclick="window.saveObraSocial()">
                <span class="material-symbols-outlined text-sm">save</span>
                Guardar
            </button>
        </div>
    </div>
</div>
