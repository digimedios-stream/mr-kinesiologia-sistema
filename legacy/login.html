<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MR Kinesiología | Ingreso al Sistema</title>
    <!-- Google Fonts: Manrope & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-primary": "#73ccd6",
                        "on-background": "#2c3436",
                        "surface-container-low": "#f0f4f6",
                        "inverse-on-surface": "#9a9d9e",
                        "error": "#a83836",
                        "secondary": "#38647d",
                        "on-primary-container": "#004147",
                        "on-surface-variant": "#596063",
                        "on-tertiary-fixed": "#153b57",
                        "secondary-dim": "#2b5870",
                        "secondary-fixed": "#c5e7ff",
                        "on-primary-fixed": "#002a2e",
                        "surface-variant": "#dce4e6",
                        "error-container": "#fa746f",
                        "on-error": "#fff7f6",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#f6f9ff",
                        "outline": "#747c7e",
                        "surface": "#f8fafb",
                        "error-dim": "#67040d",
                        "background": "#f8fafb",
                        "surface-container-highest": "#dce4e6",
                        "on-secondary-fixed": "#12445c",
                        "primary": "#006972",
                        "surface-dim": "#d4dbde",
                        "secondary-container": "#c5e7ff",
                        "on-secondary": "#f4f9ff",
                        "on-tertiary-container": "#2b4e6b",
                        "on-error-container": "#6e0a12",
                        "outline-variant": "#acb3b6",
                        "tertiary": "#406280",
                        "tertiary-container": "#b8dbfe",
                        "primary-dim": "#005c64",
                        "primary-container": "#73ccd6",
                        "on-primary": "#e9fdff",
                        "surface-container": "#eaeff0",
                        "surface-container-high": "#e3e9eb",
                        "on-surface": "#2c3436"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #006972 0%, #005c64 100%);
        }
    </style>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex items-center justify-center p-4">

    <!-- Decorative background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
        <div class="absolute -top-[20%] -right-[10%] w-[50%] h-[50%] rounded-full bg-primary-container opacity-20 blur-3xl"></div>
        <div class="absolute -bottom-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-secondary-container opacity-20 blur-3xl"></div>
    </div>

    <!-- Login Card based on design semantics -->
    <main class="w-full max-w-md bg-surface-container-lowest p-8 sm:p-10 rounded-xl shadow-2xl shadow-slate-200/50 relative border-none">
        
        <div class="text-center mb-10">
            <div class="mx-auto w-16 h-16 rounded-xl kinetic-gradient flex items-center justify-center mb-6 shadow-md shadow-primary/20">
                <span class="material-symbols-outlined text-4xl text-on-primary">health_metrics</span>
            </div>
            <h1 class="text-2xl font-headline font-extrabold tracking-tight text-on-surface mb-2">MR Kinesiología</h1>
            <p class="text-sm text-on-surface-variant">Ingrese sus credenciales de acceso</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-[0.6875rem] font-label font-bold text-on-surface-variant tracking-widest uppercase mb-2">Usuario / Correo</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
                    <input type="email" id="email" required 
                        class="w-full bg-surface-container border-none text-on-surface rounded-lg pl-12 pr-4 py-3 placeholder:text-outline-variant focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all" 
                        placeholder="ejemplo@correo.com">
                </div>
            </div>

            <div>
                <label for="password" class="block text-[0.6875rem] font-label font-bold text-on-surface-variant tracking-widest uppercase mb-2">Contraseña</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
                    <input type="password" id="password" required 
                        class="w-full bg-surface-container border-none text-on-surface rounded-lg pl-12 pr-4 py-3 placeholder:text-outline-variant focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all" 
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="btnLogin" 
                class="w-full kinetic-gradient text-on-primary font-headline font-bold text-sm py-4 rounded-lg flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-md shadow-primary/20 mt-8">
                <span>Ingresar al Sistema</span>
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
            </button>
        </form>

        <div id="message" class="mt-6"></div>
    </main>

    <!-- App Script Logic -->
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyz73EZMLxBxC1ZlMTqM0vBsgCO3kOcbOdkrJvs0kHz1HmSQazv91QXBiHGO5icZZA/exec';
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btnLogin = document.getElementById('btnLogin');
            const messageDiv = document.getElementById('message');
            
            btnLogin.innerHTML = '<span class="material-symbols-outlined animate-spin align-middle mr-2">sync</span> <span class="align-middle">Verificando...</span>';
            btnLogin.disabled = true;
            messageDiv.innerHTML = '';
            
            try {
                const formData = new URLSearchParams();
                formData.append('email', email);
                formData.append('password', password);

                const response = await fetch(`${API_URL}?action=login`, {
                    method: 'POST',
                    mode: 'cors',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('mrk_token', result.token);
                    localStorage.setItem('mrk_user', JSON.stringify(result.user));
                    
                    messageDiv.innerHTML = '<div class="p-4 bg-tertiary-container text-on-tertiary-container rounded-lg font-bold text-center text-sm"><span class="material-symbols-outlined align-middle mr-1">check_circle</span> Acceso concedido</div>';
                    setTimeout(() => window.location.href = 'index.html', 800);
                } else {
                    messageDiv.innerHTML = `<div class="p-4 bg-error-container text-on-error-container rounded-lg font-bold text-center text-sm"><span class="material-symbols-outlined align-middle mr-1">error</span> ${result.error || 'Acceso denegado'}</div>`;
                    btnLogin.innerHTML = '<span>Ingresar al Sistema</span><span class="material-symbols-outlined text-xl">arrow_forward</span>';
                    btnLogin.disabled = false;
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="p-4 bg-error-container text-on-error-container rounded-lg font-bold text-center text-sm"><span class="material-symbols-outlined align-middle mr-1">wifi_off</span> Error conectando al servidor.</div>';
                btnLogin.innerHTML = '<span>Ingresar al Sistema</span><span class="material-symbols-outlined text-xl">arrow_forward</span>';
                btnLogin.disabled = false;
            }
        });
        
        window.addEventListener('load', () => {
            if (localStorage.getItem('mrk_token')) window.location.href = 'index.html';
        });
    </script>
</body>
</html>
